<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <main class="weather-app">
    <h1>Погода</h1>

    <!-- Поиск города -->
    <form id="search-form">
      <input type="text" id="city-input" placeholder="Введите город" required>
      <button type="submit">Найти</button>
    </form>

    <!-- Сообщения -->
    <p id="loading" hidden>Загрузка...</p>
    <p id="error" hidden></p>

    <!-- Текущая погода -->
    <section id="current-weather" hidden>
      <h2 id="city-name"></h2>
      <p id="temperature"></p>
      <p id="description"></p>
      <p id="wind"></p>
      <p id="humidity"></p>
    </section>

    <!-- Прогноз (добавите позже) -->
    <section id="forecast" hidden>
      <h3>Прогноз</h3>
      <ul id="forecast-list"></ul>
    </section>

    <!-- Последние города -->
    <section id="recent-cities">
      <h3>Последние города</h3>
      <ul id="recent-cities-list"></ul>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
